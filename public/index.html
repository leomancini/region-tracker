<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Region Tracker</title>

  <!-- Open Graph -->
  <meta property="og:title" content="Region Tracker">
  <meta property="og:description" content="Track the countries, states, and provinces you've visited on interactive maps.">
  <meta property="og:image" content="https://region-tracker.noshado.ws/img/og.png">
  <meta property="og:url" content="https://region-tracker.noshado.ws">
  <meta property="og:type" content="website">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Region Tracker">
  <meta name="twitter:description" content="Track the countries, states, and provinces you've visited on interactive maps.">
  <meta name="twitter:image" content="https://region-tracker.noshado.ws/img/og.png">

  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="landing">
    <h2>Region Tracker</h2>
    <p>Track the countries, states, and provinces you've visited on interactive maps.</p>
    <form id="landing-form">
      <input type="text" id="name-input" placeholder="Your name" autocomplete="off" required pattern="[a-zA-Z0-9_-]+" />
      <button type="submit">Go</button>
    </form>
  </div>

  <div id="loader"><div class="spinner"></div></div>

  <div id="app">
    <nav id="map-switcher" class="segmented-control">
      <button class="segment active" data-map="countries">🌍</button>
      <button class="segment" data-map="states">🇺🇸</button>
      <button class="segment" data-map="ca-provinces">🇨🇦</button>
      <button class="segment" data-map="mx-states">🇲🇽</button>
      <button class="segment" data-map="provinces">🇨🇳</button>
    </nav>

    <div id="map-container"></div>

    <footer>
      <p id="stats"></p>
    </footer>
  </div>

  <div id="tooltip"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
